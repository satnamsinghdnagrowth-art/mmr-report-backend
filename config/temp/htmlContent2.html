<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cashflow Analysis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      padding: 2rem;
      background-color: white;
    }
  </style>
</head>
<body>
    <div class="bg-white p-8">
        <h2 class="text-4xl border-b-2 border-gray-200 inline-block">Cashflow</h2><span
            class="text-4xl pl-4">Analysis</span>
        <div class="grid grid-cols-2 gap-y-6 gap-x-12 mt-4">
            <div>
                <h4 class="uppercase font-semibold text-[#99a1af] text-md border-b-2 border-[#acadaf] pt-4 pb-4 mb-4">
                    Operating Cash Flow</h4>
                <p class="text-2xl font-medium text-[#000000]">$202,097</p>
                <div class="flex items-center text-md mt-5 text-[#05df72]"><svg stroke="currentColor" fill="currentColor"
                        stroke-width="0" viewBox="0 0 448 512" class="mr-1" height="1em" width="1em"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M34.9 289.5l-22.2-22.2c-9.4-9.4-9.4-24.6 0-33.9L207 39c9.4-9.4 24.6-9.4 33.9 0l194.3 194.3c9.4 9.4 9.4 24.6 0 33.9L413 289.4c-9.5 9.5-25 9.3-34.3-.4L264 168.6V456c0 13.3-10.7 24-24 24h-32c-13.3 0-24-10.7-24-24V168.6L69.2 289.1c-9.3 9.8-24.8 10-34.3.4z">
                        </path>
                    </svg><span class="text-md">(72%)</span><span class="text-[#6a7282] ml-1">From Prev Month</span></div>
                <div class="mt-3 max-h-[3.4rem] w-[40%]"><canvas role="img" height="150" width="300"></canvas></div>
            </div>
            <div>
                <h4 class="uppercase font-semibold text-[#99a1af] text-md border-b-2 border-[#acadaf] pt-4 pb-4 mb-4">Free
                    Cash Flow</h4>
                <p class="text-3xl font-medium text-[#000000]">$222,373</p>
                <div class="flex items-center text-md mt-5 text-[#05df72]"><svg stroke="currentColor" fill="currentColor"
                        stroke-width="0" viewBox="0 0 448 512" class="mr-1" height="1em" width="1em"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M34.9 289.5l-22.2-22.2c-9.4-9.4-9.4-24.6 0-33.9L207 39c9.4-9.4 24.6-9.4 33.9 0l194.3 194.3c9.4 9.4 9.4 24.6 0 33.9L413 289.4c-9.5 9.5-25 9.3-34.3-.4L264 168.6V456c0 13.3-10.7 24-24 24h-32c-13.3 0-24-10.7-24-24V168.6L69.2 289.1c-9.3 9.8-24.8 10-34.3.4z">
                        </path>
                    </svg><span class="text-md">(70%)</span><span class="text-[#6a7282] ml-1">From Prev Month</span></div>
                <div class="mt-3 max-h-[3.4rem] w-[40%]"><canvas role="img" height="150" width="300"></canvas></div>
            </div>
            <div>
                <h4 class="uppercase font-semibold text-[#99a1af] text-md border-b-2 border-[#acadaf] pt-4 pb-4 mb-4">Cash
                    on Hand</h4>
                <p class="text-3xl font-medium text-[#000000]">$537,764</p>
                <div class="flex items-center text-md mt-5 text-[#05df72]"><svg stroke="currentColor" fill="currentColor"
                        stroke-width="0" viewBox="0 0 448 512" class="mr-1" height="1em" width="1em"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M34.9 289.5l-22.2-22.2c-9.4-9.4-9.4-24.6 0-33.9L207 39c9.4-9.4 24.6-9.4 33.9 0l194.3 194.3c9.4 9.4 9.4 24.6 0 33.9L413 289.4c-9.5 9.5-25 9.3-34.3-.4L264 168.6V456c0 13.3-10.7 24-24 24h-32c-13.3 0-24-10.7-24-24V168.6L69.2 289.1c-9.3 9.8-24.8 10-34.3.4z">
                        </path>
                    </svg><span class="text-md">18%</span><span class="text-[#6a7282] ml-1">From Prev Month</span></div>
                <div class="mt-3 max-h-[3.4rem] w-[40%]"><canvas role="img" height="150" width="300"></canvas></div>
            </div>
        </div>
    </div>
</body>
</html>
