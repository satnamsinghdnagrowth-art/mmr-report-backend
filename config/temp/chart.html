<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chart.js Highlight Point</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 30px;
        background: #f9f9f9;
      }
      .chart-container {
        width: 600px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
      }
      canvas {
        width: 100% !important;
        height: auto !important;
      }
    </style>
  </head>
  <body>
    <div class="chart-container">
      <canvas id="myChart"></canvas>
    </div>

    <script>
      const ctx = document.getElementById("myChart").getContext("2d");

      const data = {
        datasets: [
          {
            label: "Main Line",
            data: [
              { x: 1, y: 10 },
              { x: 2, y: 20 },
              { x: 3, y: 15 },
              { x: 4, y: 25 },
            ],
            borderColor: "blue",
            backgroundColor: "blue",
            tension: 0.4,
            fill: false,
          },
          {
            label: "Highlighted Point",
            data: [
              { x: 3, y: 0 },
              { x: 3, y: 15 },
            ],
            pointBackgroundColor: "red",
            pointBorderColor: "red",
            borderColor: "red",
            pointRadius: 12,
            pointStyle: "star",
            showLine: true,
          },
        ],
      };

      const config = {
        type: "line",
        data: data,
        options: {
          responsive: true,
          plugins: {
            legend: {
              display: true,
            },
            tooltip: {
              enabled: true,
            },
          },
          scales: {
            x: {
              type: "linear",
              position: "bottom",
              title: {
                display: true,
                text: "X Axis",
              },
            },
            y: {
              title: {
                display: true,
                text: "Y Axis",
              },
            },
          },
        },
      };

      new Chart(ctx, config);
    </script>
  </body>
</html>
