<!DOCTYPE html>
<html>
<head>
  <title>Revenue Dropdown</title>
</head>
<body>
  <h2>Select Revenue Month</h2>

  <select id="monthDropdown" onchange="displayRevenue()">
    <option value="">-- Select Month --</option>
  </select>

  <p id="result"></p>

  <script>
    const revenueData = {
      "Revenue": {
        "Jan 2022": 102592,
        "Feb 2022": 13846,
        "Mar 2022": 9738,
        "Apr 2022": 29192,
        "May 2022": 14569,
        "Jun 2022": 16857,
        "Jul 2022": 30680,
        "Aug 2022": 29550,
        "Sep 2022": 62430,
        "Oct 2022": 28322.29,
        "Nov 2022": 13210,
        "Dec 2022": 51251.44,
        "Jan 2023": 27800.66,
        "Feb 2023": 10272,
        "Mar 2023": 217581,
        "Apr 2023": 111561,
        "May 2023": 56968,
        "Jun 2023": 87709,
        "Jul 2023": 158479,
        "Aug 2023": 129726,
        "Sep 2023": 40048.6,
        "Oct 2023": 69661,
        "Nov 2023": 103073,
        "Dec 2023": -21519.07,
        "Jan 2024": 57892.83,
        "Feb 2024": 60880.48,
        "Mar 2024": 59169.47,
        "Apr 2024": 59215.2,
        "May 2024": 87400.11,
        "Jun 2024": 87521.03,
        "Jul 2024": 88820.09,
        "Aug 2024": 92165.09,
        "Sep 2024": 94944.59,
        "Oct 2024": 97861.75,
        "Nov 2024": 102676.01,
        "Dec 2024": 108669.76,
        "Jan 2025": 257526.07
      }
    };

    const dropdown = document.getElementById("monthDropdown");
    const result = document.getElementById("result");

    // Populate dropdown
    const months = Object.keys(revenueData.Revenue);
    months.forEach(month => {
      const option = document.createElement("option");
      option.value = month;
      option.text = month;
      dropdown.add(option);
    });

    function displayRevenue() {
      const selectedMonth = dropdown.value;
      if (selectedMonth) {
        result.innerHTML = `Revenue for <strong>${selectedMonth}</strong>: ₹${revenueData.Revenue[selectedMonth].toLocaleString()}`;
      } else {
        result.innerHTML = "";
      }
    }
  </script>
</body>
</html>
